<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lois de probabilité — Relations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap');

:root {
  --bg:   #fafaf7;
  --ink:  #111111;
  --cont: #1a3a5c;
  --disc: #8b1a1a;
  --mut:  #777;
  --cas:  #1a6b3a;
  --lim:  #999;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'IBM Plex Sans',sans-serif; color:var(--ink); }

header {
  padding: 1.2rem 1.8rem 0.9rem;
  border-bottom: 2px solid var(--ink);
  display: flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.6rem;
}
header h1 { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; }

.controls { display:flex; gap:.4rem; flex-wrap:wrap; }
.btn {
  font-family:'IBM Plex Mono',monospace; font-size:.66rem; padding:.28rem .7rem;
  border:1.5px solid var(--ink); background:transparent; cursor:pointer; border-radius:3px;
  transition:background .12s,color .12s;
}
.btn:hover { background:#ddd; }
.btn.on { background:var(--ink); color:var(--bg); }

.legbar {
  display:flex; gap:1.4rem; padding:.5rem 1.8rem; border-bottom:1px solid #ddd;
  flex-wrap:wrap; background:#f0efe9; align-items:center;
}
.leg { display:flex; align-items:center; gap:.35rem; font-size:.66rem; font-family:'IBM Plex Mono',monospace; color:#555; }
.ls  { width:13px; height:10px; border-radius:2px; flex-shrink:0; }
.ll  { width:24px; height:2px; flex-shrink:0; }
.ld  { width:24px; height:0; border-top:2px dashed var(--lim); flex-shrink:0; }
.lg  { width:24px; height:2px; background:var(--cas); flex-shrink:0; }

.wrap { overflow-x:auto; padding:.5rem 0 1rem; }
svg  { display:block; margin:0 auto; }

/* Nodes */
.node { cursor:pointer; }
.node rect { transition:filter .15s; }
.node:hover rect { filter:drop-shadow(0 3px 10px rgba(0,0,0,.2)); }
.nc rect { fill:#fff; stroke:var(--cont); stroke-width:2; }
.nd rect { fill:#fff; stroke:var(--disc); stroke-width:2; }
.nk rect { fill:var(--ink); }

.nt  { font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; font-weight:600; fill:var(--ink); pointer-events:none; }
.nk .nt { fill:#f5f4ef; }
.np  { font-family:'IBM Plex Mono',monospace; font-size:9.5px; fill:var(--mut); pointer-events:none; }
.nk .np { fill:#aaa; }
.nc2 { font-family:'IBM Plex Mono',monospace; font-size:7.8px; fill:var(--cas); pointer-events:none; }
.nk .nc2 { fill:#6fc98a; }
.nd .nc2 { fill:#c05820; }

/* Edge labels */
.ep   { fill:var(--bg); }
.el   { font-family:'IBM Plex Mono',monospace; font-size:8.5px; fill:var(--ink); pointer-events:none; }
.el-l { fill:var(--lim); }
.el-g { fill:var(--cas); }
.el-d { fill:var(--disc); }

/* Hide/show edges */
.e-ex, .e-lm { transition:opacity .18s; }
.e-ex.off, .e-lm.off { opacity:0; pointer-events:none; }

/* Tooltip */
#tt {
  position:fixed; background:#fff; border:1.5px solid var(--ink); border-radius:6px;
  padding:.85rem 1rem; max-width:285px; pointer-events:none;
  opacity:0; transition:opacity .14s; z-index:200;
  box-shadow:3px 4px 0 rgba(0,0,0,.07);
}
#tt.on { opacity:1; }
#tt h3 { font-size:.84rem; font-weight:600; margin-bottom:.4rem; border-bottom:1px solid #eee; padding-bottom:.28rem; }
.tr { display:flex; justify-content:space-between; gap:.5rem; font-size:.72rem; margin:.15rem 0; font-family:'IBM Plex Mono',monospace; }
.tk { color:var(--mut); }
.tv { color:var(--ink); text-align:right; }
.tc { margin-top:.45rem; padding-top:.35rem; border-top:1px solid #eee; font-size:.69rem; color:var(--cas); font-family:'IBM Plex Mono',monospace; line-height:1.5; }
.tc-d { color:#c05820; }
</style>
</head>
<body>

<header>
  <h1>Liens entre lois de probabilité</h1>
  <div class="controls">
    <button class="btn on" id="bex" onclick="tog('ex')">Transformations exactes</button>
    <button class="btn on" id="blm" onclick="tog('lm')">Limites asymptotiques</button>
  </div>
</header>

<div class="legbar">
  <div class="leg"><div class="ls" style="border:2px solid var(--cont);background:#fff"></div>continue</div>
  <div class="leg"><div class="ls" style="border:2px solid var(--disc);background:#fff"></div>discrète</div>
  <div class="leg"><div class="ls" style="background:var(--ink)"></div>loi centrale</div>
  <div class="leg"><div class="ll" style="background:var(--ink)"></div>transformation exacte</div>
  <div class="leg"><div class="ld"></div>limite asymptotique (TCL…)</div>
  <div class="leg"><div class="lg"></div>identité paramétrique</div>
  <div class="leg" style="margin-left:auto;font-style:italic">← survoler un nœud</div>
</div>

<div class="wrap">
<!--
  NODE BOUNDARIES  (width=155, height=62)
  ───────────────────────────────────────────────────────────────────────
  name       x_l   x_r   y_t   y_b   cx    cy
  uniforme    30   185    55   117   107    86
  normale    390   545    55   117   467    86
  nstd       720   875    55   117   797    86
  chi2      1060  1215    55   117  1137    86
  exp         30   185   200   262   107   231
  student    390   545   200   262   467   231
  fisher    1060  1215   200   262  1137   231
  gamma      195   350   350   412   272   381
  poisson    640   795   350   412   717   381
  beta        30   185   495   557   107   526
  binom      390   545   495   557   467   526
  geo        840   995   495   557   917   526
  bern       390   545   630   692   467   661
  ───────────────────────────────────────────────────────────────────────

<svg viewBox="0 0 1300 760" width="1300" height="760" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="ma"  markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto"><path d="M0,.5L0,5.5L7,3z" fill="#111"/></marker>
  <marker id="mr"  markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto"><path d="M0,.5L0,5.5L7,3z" fill="#8b1a1a"/></marker>
  <marker id="mg"  markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto"><path d="M0,.5L0,5.5L7,3z" fill="#999"/></marker>
  <marker id="mv"  markerWidth="7" markerHeight="7" refX="6.5" refY="3" orient="auto"><path d="M0,.5L0,5.5L7,3z" fill="#1a6b3a"/></marker>

<!-- ══════════════════════════════════
     EXACT TRANSFORMATIONS
     ══════════════════════════════════ -->

<!-- 1. Uniforme → Exp  :  (107,117)→(107,200)  straight down -->
<line class="e-ex" x1="107" y1="117" x2="107" y2="200"
      stroke="#111" stroke-width="1.6" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="32"  y="148" width="74" height="14" rx="3"/>
<text class="el e-ex" x="69"  y="158" text-anchor="middle">−ln(U)/λ</text>

<!-- 2. Uniforme → Normale  :  right of Unif(185,76) arc to left of Norm(390,76)  Box-Muller -->
<path class="e-ex" d="M 183 70 Q 287 18 390 70"
      stroke="#111" stroke-width="1.6" fill="none" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="249" y="11" width="76" height="14" rx="3"/>

      stroke="#111" stroke-width="1.6" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="574" y="74" width="80" height="14" rx="3"/>

<text class="el e-ex" x="938" y="84" text-anchor="middle">Z₁²+…+Zₙ²</text>

<!-- 5. Normale → Student  :  (467,117)→(467,200)  straight down  Z/√(χ²/n) -->
<line class="e-ex" x1="467" y1="117" x2="467" y2="200"
      stroke="#111" stroke-width="1.6" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="472" y="148" width="82" height="14" rx="3"/>
<text class="el e-ex" x="513" y="158" text-anchor="middle">Z/√(χ²/n)</text>

<!-- 6. Chi² → Fisher  :  (1137,117)→(1137,200)  straight down  χ²(p)/χ²(q) -->
<line class="e-ex" x1="1137" y1="117" x2="1137" y2="200"

<rect class="ep e-ex" x="1142" y="148" width="98" height="14" rx="3"/>
<text class="el e-ex" x="1191" y="158" text-anchor="middle">χ²(p)/p ÷ χ²(q)/q</text>

<!-- 7. Chi² ↦ Gamma  :  (1068,117) arc to (272,350)  identity Γ(n/2,½)  GREEN -->
<path class="e-ex" d="M 1068 117 Q 720 185 272 350"
      stroke="#1a6b3a" stroke-width="1.5" fill="none" stroke-dasharray="4,3"
      marker-end="url(#mv)"/>
<rect class="ep e-ex" x="645" y="199" width="108" height="14" rx="3"/>
<text class="el el-g e-ex" x="699" y="209" text-anchor="middle">cas: Γ(n/2, ½)</text>

<!-- 8. Exp → Gamma  :  bottom Exp (107,262) arc to top Gamma (272,350)  Σ Exp -->
<path class="e-ex" d="M 130 262 Q 200 312 268 350"
      stroke="#111" stroke-width="1.6" fill="none" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="154" y="296" width="66" height="14" rx="3"/>
<text class="el e-ex" x="187" y="306" text-anchor="middle">Σ Exp(λ)</text>

<!-- 9. Exp → Poisson  :  right Exp (185,231) arc to left Poisson (640,365)  inter-arrivées -->
<path class="e-ex" d="M 185 231 Q 415 250 640 368"
      stroke="#111" stroke-width="1.6" fill="none" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="363" y="256" width="104" height="14" rx="3"/>
<text class="el e-ex" x="415" y="266" text-anchor="middle">inter-arrivées</text>

<!-- 10. Gamma → Beta  :  left Gamma (195,381) arc to top Beta (107,495)  X/(X+Y) -->
<path class="e-ex" d="M 210 412 Q 168 456 110 495"
      stroke="#111" stroke-width="1.6" fill="none" marker-end="url(#ma)"/>
<rect class="ep e-ex" x="115" y="443" width="70" height="14" rx="3"/>
<text class="el e-ex" x="150" y="453" text-anchor="middle">X/(X+Y)</text>

<!-- 11. Bernoulli → Binomiale  :  (467,630)→(467,557)  straight up  Σ n -->
<line class="e-ex" x1="467" y1="630" x2="467" y2="557"
      stroke="#8b1a1a" stroke-width="1.6" marker-end="url(#mr)"/>
<rect class="ep e-ex" x="472" y="586" width="50" height="14" rx="3"/>
<text class="el el-d e-ex" x="497" y="596" text-anchor="middle">Σ n fois</text>

<!-- ══════════════════════════════════
     ASYMPTOTIC LIMITS  (dashed gray)
     ══════════════════════════════════ -->

<!-- 12. Student → N(0,1)  :  right Student (545,220) arc to bottom N(0,1) (797,117)  n→∞ -->
<path class="e-lm" d="M 545 218 Q 682 162 797 117"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="645" y="152" width="50" height="14" rx="3"/>
<text class="el el-l e-lm" x="670" y="162" text-anchor="middle">n → ∞</text>

<!-- 13. Poisson → Normale  :  top Poisson (680,350) arc to bottom Normale (490,117)  λ→∞ -->
<path class="e-lm" d="M 678 350 Q 598 238 492 117"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="568" y="226" width="50" height="14" rx="3"/>
<text class="el el-l e-lm" x="593" y="236" text-anchor="middle">λ → ∞</text>

<!-- 14. Binomiale → Poisson  :  right Binom (545,510) arc to left Poisson (640,392)  np=λ,n→∞ -->
<path class="e-lm" d="M 545 508 Q 598 456 640 395"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="551" y="447" width="92" height="14" rx="3"/>
<text class="el el-l e-lm" x="597" y="457" text-anchor="middle">np=λ, n→∞</text>

<!-- 15. Binomiale → Normale  :  left Binom (390,510) arc to bottom Normale (435,117)  TCL -->
<path class="e-lm" d="M 390 508 Q 354 342 425 117"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="338" y="316" width="68" height="14" rx="3"/>
<text class="el el-l e-lm" x="372" y="326" text-anchor="middle">TCL n→∞</text>

<!-- 16. Géométrique → Exp  :  left Geo (840,520) arc to right Exp (185,248)  p→0 -->
<path class="e-lm" d="M 840 520 Q 556 452 185 250"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="485" y="406" width="48" height="14" rx="3"/>
<text class="el el-l e-lm" x="509" y="416" text-anchor="middle">p → 0</text>

<!-- 17. Gamma → Normale  :  top Gamma (295,350) arc to bottom Normale (448,117)  TCL α→∞ -->
<path class="e-lm" d="M 305 350 Q 402 242 445 117"
      stroke="#999" stroke-width="1.4" fill="none" stroke-dasharray="6,4"
      marker-end="url(#mg)"/>
<rect class="ep e-lm" x="355" y="228" width="72" height="14" rx="3"/>
<text class="el el-l e-lm" x="391" y="238" text-anchor="middle">TCL α→∞</text>

<!-- ══════════════════════════════════
     NODES  (drawn last → on top)
     ══════════════════════════════════ -->

<g class="node nc" transform="translate(30,55)"
   onmouseenter="st(event,'uniforme')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Uniforme</text>
  <text class="np" x="77" y="33" text-anchor="middle">U(0,1)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ cas part. de β(1,1)</text>
</g>

<g class="node nk" transform="translate(390,55)"
   onmouseenter="st(event,'normale')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Normale</text>
  <text class="np" x="77" y="33" text-anchor="middle">N(μ, σ²)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ attracteur du TCL</text>
</g>

<g class="node nc" transform="translate(720,55)"
   onmouseenter="st(event,'nstd')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Normale std</text>
  <text class="np" x="77" y="33" text-anchor="middle">N(0,1)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ N(μ,σ²) μ=0, σ=1</text>
</g>

<g class="node nc" transform="translate(1060,55)"
   onmouseenter="st(event,'chi2')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Chi-deux</text>
  <text class="np" x="77" y="33" text-anchor="middle">χ²(n)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ Γ(n/2,½) ; χ²(2)=Exp(½)</text>
</g>

<g class="node nc" transform="translate(30,200)"
   onmouseenter="st(event,'exp')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Exponentielle</text>
  <text class="np" x="77" y="33" text-anchor="middle">Exp(λ)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ Γ(1,λ) ; sans mémoire</text>
</g>

<g class="node nc" transform="translate(390,200)"
   onmouseenter="st(event,'student')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Student</text>
  <text class="np" x="77" y="33" text-anchor="middle">t(n)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ t(1) = Cauchy</text>
</g>

<g class="node nc" transform="translate(1060,200)"
   onmouseenter="st(event,'fisher')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Fisher</text>
  <text class="np" x="77" y="33" text-anchor="middle">F(p, q)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ t(n)² = F(1,n)</text>
</g>

<g class="node nc" transform="translate(195,350)"
   onmouseenter="st(event,'gamma')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Gamma</text>
  <text class="np" x="77" y="33" text-anchor="middle">Γ(α, β)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ Γ(1,λ)=Exp ; Γ(n/2,½)=χ²</text>
</g>

<g class="node nd" transform="translate(640,350)"
   onmouseenter="st(event,'poisson')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Poisson</text>
  <text class="np" x="77" y="33" text-anchor="middle" style="fill:#8b1a1a">P(λ)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ limite de B(n,p), np=λ</text>
</g>

<g class="node nc" transform="translate(30,495)"
   onmouseenter="st(event,'beta')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Bêta</text>
  <text class="np" x="77" y="33" text-anchor="middle">β(α, β)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ β(1,1) = U(0,1)</text>
</g>

<g class="node nd" transform="translate(390,495)"
   onmouseenter="st(event,'binom')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Binomiale</text>
  <text class="np" x="77" y="33" text-anchor="middle" style="fill:#8b1a1a">B(n, p)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ B(1,p) = Bernoulli</text>
</g>

<g class="node nd" transform="translate(840,495)"
   onmouseenter="st(event,'geo')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Géométrique</text>
  <text class="np" x="77" y="33" text-anchor="middle" style="fill:#8b1a1a">G(p)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ discrète sans mémoire</text>
</g>

<g class="node nd" transform="translate(390,630)"
   onmouseenter="st(event,'bern')" onmouseleave="ht()">
  <rect width="155" height="62" rx="5"/>
  <text class="nt" x="77" y="18" text-anchor="middle">Bernoulli</text>
  <text class="np" x="77" y="33" text-anchor="middle" style="fill:#8b1a1a">B(p)</text>
  <text class="nc2" x="77" y="51" text-anchor="middle">▸ B(n,p) avec n=1</text>
</g>

<text x="650" y="740" text-anchor="middle" font-family="IBM Plex Mono" font-size="8" fill="#bbb">
  Vert pointillé = identité paramétrique  ·  Flèche pleine = transformation exacte  ·  Gris pointillé = limite asymptotique
</text>
</svg>
</div>

<div id="tt">
  <h3 id="ttn"></h3>
  <div id="ttr"></div>
  <div id="ttc" class="tc"></div>
</div>

<script>
const D = {
  uniforme:{n:"Uniforme U(0,1)",
    r:[["Support","[0, 1]"],["E[X]","1/2"],["Var[X]","1/12"],["Densité","f(x) = 1 sur [0,1]"]],
    c:"Cas part. de β(1,1) = U(0,1)\nSimulation : si U~U(0,1), F⁻¹(U) ~ loi F"},
  normale:{n:"Normale N(μ, σ²)",
    r:[["Support","ℝ"],["E[X]","μ"],["Var[X]","σ²"],["Densité","(1/σ√2π) exp(−(x−μ)²/2σ²)"]],
    c:"Attracteur universel (TCL)\naX+b ~ N(aμ+b, a²σ²)\nSomme de normales indép. → normale"},
  nstd:{n:"Normale standard N(0,1)",
    r:[["Support","ℝ"],["E[X]","0"],["Var[X]","1"],["Densité","(1/√2π) exp(−x²/2)"]],
    c:"= N(μ,σ²) avec μ=0, σ=1\nZ = (X−μ)/σ  (standardisation)\nCas particulier de la Normale"},
  chi2:{n:"Chi-deux χ²(n)",
    r:[["Support","[0, +∞)"],["E[X]","n"],["Var[X]","2n"],["DDL","n"]],
    c:"= Γ(n/2, 1/2)\nχ²(2) = Exp(1/2)\nSomme de n carrés de N(0,1) indép."},
  exp:{n:"Exponentielle Exp(λ)",
    r:[["Support","[0, +∞)"],["E[X]","1/λ"],["Var[X]","1/λ²"],["Densité","λ exp(−λt)"]],
    c:"= Γ(1, λ)  (cas particulier)\nSeule loi continue sans mémoire :\nP(T>s+t | T>s) = P(T>t)\nInter-arrivées du processus de Poisson"},
  student:{n:"Student t(n)",
    r:[["Support","ℝ"],["E[X]","0  (n>1)"],["Var[X]","n/(n−2)  (n>2)"],["Construction","Z / √(V/n),  Z⊥V"]],
    c:"t(1) = Cauchy (queues très lourdes)\nt(n) → N(0,1) quand n → ∞\nUsage : σ² inconnu, test de Student"},
  fisher:{n:"Fisher F(p, q)",
    r:[["Support","[0, +∞)"],["E[X]","q/(q−2)  q>2"],["Construction","[χ²(p)/p] / [χ²(q)/q]"]],
    c:"t(n)² = F(1, n)\nF(1,n) → χ²(1) si n→∞\nUsage : ANOVA, régression, rapport de vraisemblance"},
  gamma:{n:"Gamma Γ(α, β)",
    r:[["Support","[0, +∞)"],["E[X]","α/β"],["Var[X]","α/β²"],["Densité","βᵅ xᵅ⁻¹ e⁻βˣ / Γ(α)"]],
    c:"Γ(1, λ) = Exp(λ)\nΓ(n/2, ½) = χ²(n)\nStabilité : Γ(α₁,β) + Γ(α₂,β) = Γ(α₁+α₂, β)"},
  poisson:{n:"Poisson P(λ)",d:1,
    r:[["Support","ℕ = {0,1,2,…}"],["E[X]","λ"],["Var[X]","λ"],["P(X=k)","λᵏ e⁻λ / k!"]],
    c:"Limite de B(n,p) quand np=λ, n→∞\nP(λ) → N(λ,λ) quand λ→∞\nNombre d'événements rares par unité"},
  beta:{n:"Bêta β(α, β)",
    r:[["Support","[0, 1]"],["E[X]","α/(α+β)"],["Var[X]","αβ / [(α+β)²(α+β+1)]"],["Construction","X/(X+Y), X~Γ(α), Y~Γ(β)"]],
    c:"β(1,1) = U(0,1)\nLoi a priori conjuguée de B(n,p)\nModélise des probabilités"},
  binom:{n:"Binomiale B(n, p)",d:1,
    r:[["Support","{0, 1, …, n}"],["E[X]","np"],["Var[X]","np(1−p)"],["P(X=k)","C(n,k) pᵏ (1−p)ⁿ⁻ᵏ"]],
    c:"B(1, p) = Bernoulli\n→ P(λ) si np=λ et n→∞\n→ N(np, np(1−p)) par le TCL"},
  geo:{n:"Géométrique G(p)",d:1,
    r:[["Support","{1, 2, 3, …}"],["E[X]","1/p"],["Var[X]","(1−p)/p²"],["P(X=k)","(1−p)^{k−1} p"]],
    c:"Seule loi discrète sans mémoire\nAnalogue discret de Exp(λ)\nG(p) → Exp quand p→0"},
  bern:{n:"Bernoulli B(p)",d:1,
    r:[["Support","{0, 1}"],["E[X]","p"],["Var[X]","p(1−p)"],["P(X=1)","p"]],
    c:"Brique de base discrète\nΣ n Bernoulli(p) = B(n,p)\nCas particulier de B(n,p) avec n=1"}
};

const tt=document.getElementById('tt');

function st(e,k){
  const d=D[k];
  const hn=document.getElementById('ttn');
  hn.textContent=d.n; hn.style.color=d.d?'#8b1a1a':'#1a3a5c';
  document.getElementById('ttr').innerHTML=
    d.r.map(([a,b])=>`<div class="tr"><span class="tk">${a}</span><span class="tv">${b}</span></div>`).join('');
  const ce=document.getElementById('ttc');
  ce.style.display='block';
  ce.innerHTML=d.c.replace(/\n/g,'<br>');
  ce.className='tc'+(d.d?' tc-d':'');
  tt.classList.add('on'); mv(e);
}

function mv(e){
  const x=e.clientX+16,y=e.clientY-10,w=tt.offsetWidth,h=tt.offsetHeight;
  tt.style.left=(x+w>innerWidth?e.clientX-w-10:x)+'px';
  tt.style.top=(y+h>innerHeight?e.clientY-h:y)+'px';
}

function ht(){ tt.classList.remove('on'); }
document.addEventListener('mousemove',e=>{ if(tt.classList.contains('on')) mv(e); });

let ex=true,lm=true;
function tog(t){
  if(t==='ex'){
    ex=!ex;
    document.querySelectorAll('.e-ex').forEach(el=>el.classList.toggle('off',!ex));
    document.getElementById('bex').classList.toggle('on',ex);
  } else {
    lm=!lm;
    document.querySelectorAll('.e-lm').forEach(el=>el.classList.toggle('off',!lm));
    document.getElementById('blm').classList.toggle('on',lm);
  }
}
</script>
