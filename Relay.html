<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gateway — Student Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0E1320;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;

  }
  ::-webkit-scrollbar { width:0; height:0; }
  input,button,select,textarea { font-family:inherit; }
</style>
</head>
<body>

<script type="text/babel" src="relay-components.jsx"></script>
<script type="text/babel" src="relay-screens.jsx"></script>
<script type="text/babel" src="relay-screens-2.jsx"></script>

<div id="root"></div>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "FR",
  "startScreen": "onboarding"
}/*EDITMODE-END*/;

// ── Bottom Nav — adapté au rôle ───────────────────────────────
function AppBottomNav({ tab, setTab, navigate, role }) {
  const ic = (active, path, isCircle) => {
    const c = active ? COLORS.accent : COLORS.gray400;
    if (isCircle) return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>;
    return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round">{path}</svg>;
  };

  const navByRole = {
    student: [
      { id: 'home',      label: 'Accueil',   screen: 'home',      icon: a => ic(a, <><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></>) },
      { id: 'doleances', label: 'Doléances', screen: 'community', icon: a => ic(a, <><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></>) },
      { id: 'mentors',   label: 'Mentors',   screen: 'mentors',   icon: a => ic(a, <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>) },
      { id: 'profile',   label: 'Profil',    screen: 'profile',   icon: a => ic(a, null, true) },
    ],
    admin: [
      { id: 'home',          label: 'Tableau de bord', screen: 'home',          icon: a => ic(a, <><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>) },
      { id: 'tickets',       label: 'Tickets',         screen: 'tickets',       icon: a => ic(a, <><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></>) },
      { id: 'notifications', label: 'Alertes',          screen: 'notifications', icon: a => ic(a, <><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></>) },
      { id: 'settings',      label: 'Paramètres',       screen: 'settings',      icon: a => ic(a, <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></>) },
    ],
    mentor: [
      { id: 'home',     label: 'Accueil',   screen: 'home',    icon: a => ic(a, <><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></>) },
      { id: 'mentores', label: 'Mentorés',  screen: 'mentors', icon: a => ic(a, <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>) },
      { id: 'messages', label: 'Messages',  screen: 'inbox',   icon: a => ic(a, <><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></>) },
      { id: 'profile',  label: 'Profil',    screen: 'profile', icon: a => ic(a, null, true) },
    ],
  };

  const tabs = navByRole[role] || navByRole.student;

  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: COLORS.white, borderTop: `1px solid ${COLORS.gray200}`,
      display: 'flex', paddingBottom: 22, paddingTop: 8, zIndex: 100,
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => { setTab(t.id); navigate(t.screen); }} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 3, border: 'none', background: 'none', cursor: 'pointer', padding: '4px 0',
        }}>
          {t.icon(tab === t.id)}
          <span style={{
            fontFamily: "'DM Sans',sans-serif", fontSize: 10,
            fontWeight: tab === t.id ? 600 : 400,
            color: tab === t.id ? COLORS.accent : COLORS.gray400,
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── Screens that hide the bottom nav ─────────────────────────
const NO_NAV_SCREENS = ['onboarding', 'matching', 'chat', 'submit', 'submitSuccess', 'ticketDetail', 'mentorProfile', 'settings'];

// ── Full screen list for the pill nav ────────────────────────
const SCREEN_GROUPS = [
  {
    label: 'Onboarding',
    screens: [
      { id: 'onboarding', label: '① Onboarding' },
      { id: 'matching',   label: '② AI Matching' },
    ],
  },
  {
    label: 'Accueil',
    screens: [
      { id: 'home',          label: '③ Accueil' },
      { id: 'notifications', label: '④ Notifications' },
    ],
  },
  {
    label: 'Doléances',
    screens: [
      { id: 'community',     label: '⑤ Campus Feed' },
      { id: 'submit',        label: '⑥ Soumettre' },
      { id: 'submitSuccess', label: '⑦ Confirmation' },
      { id: 'tickets',       label: '⑧ Mes Tickets' },
      { id: 'ticketDetail',  label: '⑨ Ticket Détail' },
    ],
  },
  {
    label: 'Mentors',
    screens: [
      { id: 'mentors',       label: '⑩ Mentors' },
      { id: 'mentorProfile', label: '⑪ Profil Mentor' },
      { id: 'inbox',         label: '⑫ Messagerie' },
      { id: 'chat',          label: '⑬ Conversation' },
    ],
  },
  {
    label: 'Profil',
    screens: [
      { id: 'profile',  label: '⑭ Mon Profil' },
      { id: 'settings', label: '⑮ Paramètres' },
    ],
  },
];
const ALL_SCREENS = SCREEN_GROUPS.flatMap(g => g.screens);

// ── Top App Bar ───────────────────────────────────────────────
function AppTopBar({ onMenuOpen, role, lang }) {
  const roleColor = { student: COLORS.accent, mentor: '#7C3AED', admin: COLORS.orange };
  const roleLabel = { student: '👨‍🎓 Étudiant', mentor: '🤝 Mentor', admin: '🏛️ Admin' };
  const rc = roleColor[role] || COLORS.accent;
  return (
    <div style={{
      position: 'absolute', top: 54, left: 0, right: 0, zIndex: 120,
      height: 50, background: COLORS.white,
      borderBottom: `1px solid ${COLORS.gray200}`,
      display: 'flex', alignItems: 'center', padding: '0 16px', gap: 10,
    }}>
      <button onClick={onMenuOpen} style={{
        width: 36, height: 36, borderRadius: 10, border: 'none',
        background: COLORS.gray100, cursor: 'pointer', flexShrink: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', gap: 4.5,
      }}>
        {[16, 11, 16].map((w, i) => (
          <div key={i} style={{ width: w, height: 2, borderRadius: 2, background: COLORS.primary }} />
        ))}
      </button>
      <span style={{ fontFamily: "'Sora',sans-serif", fontSize: 17, fontWeight: 800, color: COLORS.primary, flex: 1 }}>
        Gateway
      </span>
      <span style={{
        padding: '3px 10px', borderRadius: 20,
        background: rc + '18', color: rc,
        fontFamily: "'DM Sans',sans-serif", fontSize: 10, fontWeight: 700,
        border: `1px solid ${rc}40`,
      }}>{roleLabel[role] || roleLabel.student}</span>
    </div>
  );
}

// ── Side Drawer ───────────────────────────────────────────────
function AppSideMenu({ open, onClose, navigate, role, setRole, lang }) {
  const roleColors = { student: COLORS.accent, mentor: '#7C3AED', admin: COLORS.orange };
  const roleNames  = { student: 'Amine El Mansouri', mentor: 'Yasmine Benali', admin: 'Admin INPT' };
  const roleSubs   = { student: 'Étudiant · GL3', mentor: 'Mentor · Google', admin: 'Administration INPT' };

  const menuByRole = {
    student: [
      { icon: '🏠', label: 'Accueil',              screen: 'home' },
      { icon: '🔔', label: 'Notifications',         screen: 'notifications' },
      { icon: '📋', label: 'Mes doléances',         screen: 'tickets' },
      { icon: '🚨', label: 'Signaler un problème',  screen: 'submit' },
      { icon: '👥', label: 'Mentors',               screen: 'mentors' },
      { icon: '✨', label: 'Matching IA',           screen: 'matching' },
      { icon: '👤', label: 'Mon profil',            screen: 'profile' },
    ],
    admin: [
      { icon: '🏠', label: 'Tableau de bord',  screen: 'home' },
      { icon: '📋', label: 'Tous les tickets', screen: 'tickets' },
      { icon: '🔔', label: 'Alertes',          screen: 'notifications' },
      { icon: '📊', label: 'Campus Feed',      screen: 'community' },
    ],
    mentor: [
      { icon: '🏠', label: 'Accueil',       screen: 'home' },
      { icon: '👥', label: 'Mes mentorés',  screen: 'mentors' },
      { icon: '💬', label: 'Messages',      screen: 'inbox' },
      { icon: '👤', label: 'Mon profil',    screen: 'profile' },
    ],
  };

  const items = menuByRole[role] || menuByRole.student;
  const rc    = roleColors[role] || COLORS.accent;

  if (!open) return null;

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 500 }}>
      {/* Backdrop */}
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: 'rgba(10,20,50,0.45)',
      }} />

      {/* Drawer panel */}
      <div style={{
        position: 'absolute', top: 0, left: 0, bottom: 0,
        width: '78%', maxWidth: 310,
        background: COLORS.white,
        display: 'flex', flexDirection: 'column',
        boxShadow: '8px 0 40px rgba(0,0,0,0.22)',
        borderRadius: '0 24px 24px 0',
        overflow: 'hidden',
      }}>
        {/* Header */}
        <div style={{ background: `linear-gradient(135deg, ${COLORS.primary} 0%, #2A5298 100%)`, padding: '52px 20px 22px' }}>
          <Avatar name={roleNames[role]} size={56} color={rc} />
          <div style={{ marginTop: 12, fontFamily: "'Sora',sans-serif", fontSize: 16, fontWeight: 700, color: '#fff' }}>
            {roleNames[role]}
          </div>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: 'rgba(255,255,255,0.6)', marginTop: 3 }}>
            {roleSubs[role]}
          </div>
          <div style={{ marginTop: 10 }}>
            <span style={{
              padding: '4px 12px', borderRadius: 20,
              background: rc + '30', color: rc,
              fontFamily: "'DM Sans',sans-serif", fontSize: 10, fontWeight: 700,
              border: `1px solid ${rc}60`,
            }}>
              {role === 'student' ? '👨‍🎓 Étudiant' : role === 'mentor' ? '🤝 Mentor' : '🏛️ Admin'}
            </span>
          </div>
        </div>

        {/* Nav items */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '10px 0' }}>
          {items.map((item, i) => (
            <button key={i} onClick={() => { navigate(item.screen); onClose(); }} style={{
              width: '100%', padding: '13px 20px',
              display: 'flex', alignItems: 'center', gap: 14,
              border: 'none', background: 'none', cursor: 'pointer', textAlign: 'left',
              transition: 'background 0.12s',
            }}
            onMouseEnter={e => e.currentTarget.style.background = COLORS.gray100}
            onMouseLeave={e => e.currentTarget.style.background = 'none'}
            >
              <span style={{ fontSize: 19, width: 26, textAlign: 'center' }}>{item.icon}</span>
              <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 14, fontWeight: 500, color: COLORS.gray900 }}>
                {item.label}
              </span>
            </button>
          ))}

          <div style={{ height: 1, background: COLORS.gray200, margin: '8px 20px' }} />

          <button onClick={() => { navigate('settings'); onClose(); }} style={{
            width: '100%', padding: '13px 20px',
            display: 'flex', alignItems: 'center', gap: 14,
            border: 'none', background: 'none', cursor: 'pointer', textAlign: 'left',
          }}
          onMouseEnter={e => e.currentTarget.style.background = COLORS.gray100}
          onMouseLeave={e => e.currentTarget.style.background = 'none'}
          >
            <span style={{ fontSize: 19, width: 26, textAlign: 'center' }}>⚙️</span>
            <span style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 14, fontWeight: 500, color: COLORS.gray900 }}>Paramètres</span>
          </button>
        </div>

        {/* Footer — role switcher */}
        <div style={{ padding: '14px 20px 32px', borderTop: `1px solid ${COLORS.gray200}` }}>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 10, color: COLORS.gray400, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 0.5 }}>
            Changer de rôle
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[
              { id: 'student', label: 'Étudiant', color: COLORS.accent },
              { id: 'mentor',  label: 'Mentor',   color: '#7C3AED' },
              { id: 'admin',   label: 'Admin',    color: COLORS.orange },
            ].map(r => (
              <button key={r.id} onClick={() => { setRole(r.id); navigate('home'); onClose(); }} style={{
                flex: 1, padding: '7px 4px', borderRadius: 10,
                border: `1.5px solid ${role === r.id ? r.color : COLORS.gray200}`,
                background: role === r.id ? r.color + '15' : 'none',
                color: role === r.id ? r.color : COLORS.gray600,
                fontFamily: "'DM Sans',sans-serif", fontSize: 10, fontWeight: 600,
                cursor: 'pointer',
              }}>{r.label}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function RelayApp() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('gateway_screen') || TWEAK_DEFAULTS.startScreen);
  const [tab, setTab]       = React.useState(() => localStorage.getItem('gateway_tab') || 'home');
  const [lang, setLang]     = React.useState(() => localStorage.getItem('gateway_lang') || TWEAK_DEFAULTS.lang);
  const [role, setRole]     = React.useState(() => localStorage.getItem('gateway_role') || 'student');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [menuOpen, setMenuOpen]     = React.useState(false);

  const navigate = (s) => { setScreen(s); localStorage.setItem('gateway_screen', s); };
  const handleTab = (t) => { setTab(t); localStorage.setItem('gateway_tab', t); };
  const handleLang = (l) => { setLang(l); localStorage.setItem('gateway_lang', l); };
  const handleRole = (r) => { setRole(r); localStorage.setItem('gateway_role', r); };

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const showBottomNav = !NO_NAV_SCREENS.includes(screen);

  const screenProps = { navigate, lang, setLang: handleLang, role, setRole: handleRole };

  const renderScreen = () => {
    switch (screen) {
      case 'onboarding':    return <ScreenOnboarding    {...screenProps} />;
      case 'matching':      return <ScreenMatching       {...screenProps} />;
      case 'home':          return <ScreenHome           {...screenProps} tab={tab} setTab={handleTab} />;
      case 'notifications': return <ScreenNotifications  {...screenProps} />;
      case 'community':     return <ScreenCommunity      {...screenProps} />;
      case 'submit':        return <ScreenSubmit         {...screenProps} navigate={(s) => { navigate(s); handleTab('home'); }} />;
      case 'submitSuccess': return <ScreenSubmitSuccess  {...screenProps} />;
      case 'tickets':       return <ScreenTickets        {...screenProps} />;
      case 'ticketDetail':  return <ScreenTicketDetail   {...screenProps} />;
      case 'mentors':       return <ScreenMentors        {...screenProps} />;
      case 'mentorProfile': return <ScreenMentorProfile  {...screenProps} />;
      case 'inbox':         return <ScreenInbox          {...screenProps} />;
      case 'chat':          return <ScreenChat           {...screenProps} />;
      case 'profile':       return <ScreenProfile        {...screenProps} navigate={(s) => navigate(s)} />;
      case 'settings':      return <ScreenSettings       {...screenProps} />;
      default:              return <ScreenHome           {...screenProps} tab={tab} setTab={handleTab} />;
    }
  };

  const isRTL = lang === 'دارجة';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 18 }}>
      {/* ── Phone frame ── */}
      <div style={{
        width: 402, borderRadius: 50, overflow: 'hidden',
        boxShadow: '0 50px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.07)',
        background: '#F7F8FC', position: 'relative',
        direction: 'ltr', /* always LTR at frame level; screens handle RTL internally */
      }}>
        {/* Dynamic island */}
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 200, pointerEvents: 'none',
        }}/>

        {/* Status bar */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, zIndex: 100,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          padding: '16px 24px 0', pointerEvents: 'none',
        }}>
          <span style={{ fontFamily: '-apple-system,system-ui', fontWeight: 600, fontSize: 15, color: ['onboarding','matching'].includes(screen) ? '#fff' : '#1A1D2E', paddingTop: 4 }}>9:41</span>
          <div style={{ display: 'flex', gap: 5, alignItems: 'center', paddingTop: 4 }}>
            {(() => {
              const c = ['onboarding','matching'].includes(screen) ? '#fff' : '#1A1D2E';
              return (<>
                <svg width="16" height="12" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/></svg>
                <svg width="15" height="11" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/><circle cx="8.5" cy="10.5" r="1.5" fill={c}/></svg>
                <svg width="25" height="12" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c}/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/></svg>
              </>);
            })()}
          </div>
        </div>

        {/* Top nav bar — visible sur les écrans principaux */}
        {showBottomNav && (
          <AppTopBar onMenuOpen={() => setMenuOpen(true)} role={role} lang={lang} />
        )}

        {/* Content */}
        <div style={{ height: 844, overflowY: 'auto', paddingTop: showBottomNav ? 104 : 54, position: 'relative', transform: 'translateZ(0)' }}>
          {renderScreen()}
        </div>

        {/* Bottom nav */}
        {showBottomNav && (
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 150 }}>
            <AppBottomNav tab={tab} setTab={handleTab} navigate={navigate} role={role} />
          </div>
        )}

        {/* Side drawer */}
        <AppSideMenu
          open={menuOpen}
          onClose={() => setMenuOpen(false)}
          navigate={navigate}
          role={role}
          setRole={handleRole}
          lang={lang}
        />

        {/* Notification bell — visible on home/community/mentors/profile */}
        {showBottomNav && (
          <button onClick={() => navigate('notifications')} style={{
            position: 'absolute', top: 60, right: 20, zIndex: 90,
            width: 36, height: 36, borderRadius: '50%',
            background: COLORS.white, border: `1px solid ${COLORS.gray200}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 2px 8px rgba(27,58,107,0.1)', cursor: 'pointer',
          }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={COLORS.primary} strokeWidth="2" strokeLinecap="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <div style={{
              position: 'absolute', top: 6, right: 6,
              width: 9, height: 9, borderRadius: '50%', background: COLORS.red, border: '2px solid white',
            }}/>
          </button>
        )}

        {/* Profile shortcut — on home only */}
        {screen === 'home' && (
          <button onClick={() => navigate('profile')} style={{
            position: 'absolute', top: 60, left: 20, zIndex: 90,
            width: 36, height: 36, borderRadius: '50%', overflow: 'hidden',
            border: `2px solid ${COLORS.accent}`, cursor: 'pointer',
            background: COLORS.primary, display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: "'Sora',sans-serif", fontSize: 12, fontWeight: 700, color: '#fff',
          }}>AE</button>
        )}

        {/* Home indicator */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 300,
          height: 8, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
          paddingBottom: 6, pointerEvents: 'none',
        }}>
          <div style={{ width: 134, height: 5, borderRadius: 100, background: 'rgba(0,0,0,0.2)' }}/>
        </div>
      </div>

      <p style={{ color: 'rgba(255,255,255,0.2)', fontSize: 11, fontFamily: "'DM Sans',sans-serif", marginTop: 4 }}>
        Gateway · 15 écrans · Prototype interactif · INPT 2026
      </p>

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, background: '#1A2035',
          borderRadius: 18, padding: '20px', width: 252,
          boxShadow: '0 12px 40px rgba(0,0,0,0.5)', border: '1px solid rgba(255,255,255,0.08)',
          zIndex: 9999, color: '#fff', fontFamily: "'DM Sans',sans-serif",
        }}>
          <div style={{ fontFamily: "'Sora',sans-serif", fontWeight: 700, fontSize: 14, marginBottom: 18 }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div>
              <label style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', display: 'block', marginBottom: 7, textTransform: 'uppercase', letterSpacing: 0.5 }}>Rôle</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {[{id:'student',label:'Étudiant'},{id:'mentor',label:'Mentor'},{id:'admin',label:'Admin'}].map(r => (
                  <button key={r.id} onClick={() => { handleRole(r.id); navigate('home'); }} style={{
                    flex: 1, padding: '6px 4px', borderRadius: 10, border: 'none', cursor: 'pointer',
                    background: role === r.id ? '#00C9B1' : 'rgba(255,255,255,0.08)',
                    color: role === r.id ? '#fff' : 'rgba(255,255,255,0.45)',
                    fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 600,
                  }}>{r.label}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', display: 'block', marginBottom: 7, textTransform: 'uppercase', letterSpacing: 0.5 }}>Langue</label>
              <div style={{ display: 'flex', gap: 8 }}>
                {['FR', 'دارجة'].map(l => (
                  <button key={l} onClick={() => handleLang(l)} style={{
                    flex: 1, padding: '7px', borderRadius: 10, border: 'none', cursor: 'pointer',
                    background: lang === l ? '#00C9B1' : 'rgba(255,255,255,0.08)',
                    color: lang === l ? '#fff' : 'rgba(255,255,255,0.45)',
                    fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
                  }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', display: 'block', marginBottom: 7, textTransform: 'uppercase', letterSpacing: 0.5 }}>Écran</label>
              <select value={screen} onChange={e => navigate(e.target.value)} style={{
                width: '100%', padding: '8px 10px', borderRadius: 10, border: 'none',
                background: 'rgba(255,255,255,0.08)', color: '#fff',
                fontFamily: "'DM Sans',sans-serif", fontSize: 12,
              }}>
                {ALL_SCREENS.map(s => <option key={s.id} value={s.id} style={{ background: '#1A2035' }}>{s.label}</option>)}
              </select>
            </div>
            <div style={{ borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 12, fontSize: 10, color: 'rgba(255,255,255,0.25)', lineHeight: 1.7 }}>
              15 écrans interactifs. Naviguez via ce menu.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RelayApp />);
</script>
</body>
</html>
